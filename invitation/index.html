<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A premium wedding landing page with a traditional Telugu theme and a modern luxury aesthetic." />
    <title>Arjun & Sravya | Wedding Invitation</title>

    <!-- Elegant typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&family=Great+Vibes&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --ivory: #fdf7ef;
        --gold: #c8a24c;
        --brown: #4a3526;
        --terracotta: #b85c38;
        --sage: #7b8f6a;
        --shadow: rgba(74, 53, 38, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        font-family: "Cormorant Garamond", serif;
        color: var(--brown);
        background:
          radial-gradient(circle at top left, rgba(200, 162, 76, 0.06), transparent 24%),
          radial-gradient(circle at bottom right, rgba(184, 92, 56, 0.05), transparent 22%),
          linear-gradient(135deg, #fdf7ef 0%, #fcf3e7 100%);
        overflow-x: hidden;
      }

      a {
        color: inherit;
      }

      .page-shell {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
      }

      /* Hero layout with the mandala used as a soft ornamental background. */
      .hero {
        position: relative;
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(0, 1.05fr) minmax(260px, 0.95fr);
        align-items: center;
        padding: clamp(2rem, 4vw, 4rem) clamp(1.5rem, 3vw, 3rem) 5rem;
        isolation: isolate;
      }

      .hero__content {
        position: relative;
        z-index: 2;
        max-width: 650px;
        padding: clamp(1.25rem, 3vw, 2rem) 0;
        opacity: 0;
        transform: translateY(24px);
        animation: fade-up 1.2s ease forwards 0.2s;
      }

      .hero__eyebrow {
        margin: 0 0 1rem;
        font-family: "Cinzel", serif;
        font-size: 0.8rem;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: var(--gold);
        opacity: 0;
        transform: translateY(12px);
        animation: text-reveal 0.8s ease forwards 0.35s;
      }

      .hero__names {
        margin: 0 0 0.55rem;
        font-family: "Great Vibes", cursive;
        font-size: clamp(3rem, 5vw, 4.8rem);
        line-height: 0.95;
        color: var(--brown);
        opacity: 0;
        transform: translateY(12px);
        animation: text-reveal 0.9s ease forwards 0.55s;
      }

      .hero__invite {
        margin: 0 0 0.85rem;
        font-family: "Cinzel", serif;
        font-size: 0.95rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--sage);
        opacity: 0;
        transform: translateY(12px);
        animation: text-reveal 0.8s ease forwards 0.75s;
      }

      .hero__date {
        margin: 0 0 1.1rem;
        font-size: 1.05rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(74, 53, 38, 0.82);
        opacity: 0;
        transform: translateY(12px);
        animation: text-reveal 0.8s ease forwards 0.9s;
      }

      .hero__paragraph {
        margin: 0 0 2rem;
        max-width: 540px;
        font-size: 1.12rem;
        line-height: 1.8;
        color: rgba(74, 53, 38, 0.85);
        opacity: 0;
        transform: translateY(12px);
        animation: text-reveal 0.8s ease forwards 1.05s;
      }

      .hero__button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.95rem 1.7rem;
        border: 1.8px solid var(--gold);
        border-radius: 999px;
        font-family: "Cinzel", serif;
        font-size: 0.76rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        text-decoration: none;
        color: var(--gold);
        background: transparent;
        box-shadow: 0 12px 30px var(--shadow);
        transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
        opacity: 0;
        transform: translateY(12px);
        animation: text-reveal 0.8s ease forwards 1.2s;
      }

      .hero__button:hover,
      .hero__button:focus-visible {
        transform: scale(1.03);
        background: rgba(200, 162, 76, 0.08);
        box-shadow: 0 16px 36px rgba(200, 162, 76, 0.18);
      }

      /* Decorative mandala on the right, softly faded and never interfering with readability. */
      .hero__mandala {
        position: absolute;
        top: -120px;
        right: -170px;
        width: min(720px, 60vw);
        max-width: 720px;
        opacity: 0.07;
        filter: blur(1px) saturate(0.95);
        pointer-events: none;
        z-index: 0;
        transform-origin: center;
        animation: spin 110s linear infinite;
        user-select: none;
      }

      .scroll-indicator {
        position: absolute;
        bottom: 1.8rem;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.45rem;
        color: var(--brown);
        font-family: "Cinzel", serif;
        font-size: 0.72rem;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        opacity: 0.9;
        animation: pulse 2.6s ease-in-out infinite;
        z-index: 2;
      }

      .scroll-indicator__line {
        display: block;
        width: 1px;
        height: 2.3rem;
        background: linear-gradient(to bottom, transparent, var(--gold), transparent);
      }

      @keyframes fade-up {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes text-reveal {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          transform: translateX(-50%) translateY(0);
        }
        50% {
          transform: translateX(-50%) translateY(6px);
        }
      }

      @media (max-width: 900px) {
        .hero {
          grid-template-columns: 1fr;
          padding: 3.2rem 1.25rem 4.5rem;
        }

        .hero__content {
          max-width: 600px;
        }

        .hero__mandala {
          top: -70px;
          right: -110px;
          width: min(540px, 78vw);
          opacity: 0.05;
        }
      }

      @media (max-width: 480px) {
        .hero__eyebrow {
          font-size: 0.72rem;
          letter-spacing: 0.2em;
        }

        .hero__names {
          font-size: 2.7rem;
        }

        .hero__paragraph {
          font-size: 1rem;
        }

        .hero__button {
          padding: 0.85rem 1.4rem;
          font-size: 0.72rem;
        }

        .hero__mandala {
          top: -50px;
          right: -90px;
          width: min(420px, 82vw);
          opacity: 0.04;
        }
      }
    </style>
  </head>
  <body>
    <main class="page-shell">
      <section class="hero" id="home" aria-labelledby="wedding-title">
        <img class="hero__mandala" src="assets/mandala.jpeg" alt="" aria-hidden="true" />

        <div class="hero__content">
          <p class="hero__eyebrow">Together with their families</p>
          <h1 class="hero__names" id="wedding-title">Arjun &amp; Sravya</h1>
          <p class="hero__invite">Wedding Invitation</p>
          <p class="hero__date">Saturday, 14 December 2026</p>
          <p class="hero__paragraph">
            With hearts full of gratitude and joy, we invite you to celebrate a sacred union woven with tradition,
            devotion, and timeless grace.
          </p>
          <a class="hero__button" href="#journey">Begin Our Journey</a>
        </div>

        <div class="scroll-indicator" aria-label="Scroll down">
          <span class="scroll-indicator__line"></span>
          <span>Scroll</span>
        </div>
      </section>
    </main>

    <script>
      (() => {
        const heroContent = document.querySelector('.hero__content');
        const mandala = document.querySelector('.hero__mandala');

        const applyScrollEffect = () => {
          const scrollY = window.scrollY;
          const maxFade = 140;
          const progress = Math.min(1, scrollY / maxFade);
          const opacity = Math.max(0.25, 1 - progress);
          const offset = Math.max(0, 24 * (1 - opacity));

          heroContent.style.opacity = opacity.toFixed(2);
          heroContent.style.transform = `translateY(${offset}px)`;
          mandala.style.opacity = (0.07 * opacity).toFixed(2);
        };

        window.addEventListener('scroll', applyScrollEffect, { passive: true });
        window.addEventListener('load', applyScrollEffect);
      })();
    </script>
  </body>
</html>
